<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMIBOOK — Perpustakaan Kampus Digital</title>
    <meta name="description" content="Sistem informasi perpustakaan kampus digital AMIKOM — akses ribuan koleksi buku akademik." />
    <!-- Prevent FOUC (Flash of Unstyled Content) by setting bg color before CSS loads -->
    <style>
      html, body, #root { background-color: #FFF3FB; margin: 0; padding: 0; }
      /* Prevent icon font FOUT — show placeholder while loading */
      .material-symbols-outlined { font-size: inherit; line-height: inherit; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts with display=swap for smooth rendering without layout shift -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />
    <!-- Preload hero banner so it shows instantly -->
    <link rel="preload" as="image" href="/hero-banner.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
